name: CI

on:
  push:
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
      - name: Bash syntax check
        run: bash -n lazarus-backup
      - name: Shellcheck (errors only)
        run: shellcheck -S error -x lazarus-backup

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: System info
        run: |
          bash --version | head -1
          openssl version
          which python3 || true
          which timeout || true
          which gzip || true
          uname -a
      - name: Install test deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq openssl coreutils python3 gzip
      - name: Run tests (verbose)
        run: bash -x .github/tests/run.sh
        env:
          # Force locale (некоторые tests с unicode в bash зависят от UTF-8)
          LC_ALL: C.UTF-8
          LANG: C.UTF-8
